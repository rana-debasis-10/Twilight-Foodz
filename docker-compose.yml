services:
  backend:
    image: twilight-backend:latest
    container_name: backend
    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/twilight
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

      RAZORPAY_KEY: ${RAZORPAY_KEY}
      RAZORPAY_SECRET: ${RAZORPAY_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}

      MESSAGE_KEY: ${MESSAGE_KEY}
      MESSAGE_ENDPOINT: ${MESSAGE_ENDPOINT}

      STORAGE_CLIENT_REGION: ${STORAGE_CLIENT_REGION}
      STORAGE_CLIENT_ENDPOINT: http://minio:9000
      STORAGE_CLIENT_BUCKET: ${STORAGE_CLIENT_BUCKET}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    depends_on:
      - postgres
      - kafka
      - redis
      - minio

    restart: unless-stopped


  postgres:
    image: postgis/postgis:17-3.5

    container_name: postgres

    environment:
      POSTGRES_DB: twilight
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

    volumes:
      - kafka-data:/var/lib/kafka/data

    restart: unless-stopped

  redis:
    image: redis:latest

    container_name: redis

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis-data:/data

    restart: unless-stopped

  minio:
    image: minio/minio:latest

    container_name: minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER:  ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}

    command: server /data --console-address ":9001"

    volumes:
      - minio-data:/data

    restart: unless-stopped


volumes:
  postgres-data:
  kafka-data:
  redis-data:
  minio-data:
